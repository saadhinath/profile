<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhi | Developer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
background:linear-gradient(270deg,#000000,#0f2027,#000000);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
color:white;
overflow:hidden;
}

/* animated background */
@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:25px;
font-size:18px;
transition:0.4s;
}

.navbar a:hover{
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

/* MAIN */

.container{
text-align:center;
margin-top:140px;
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.title{
font-size:3rem;
}

.name{
color:#00ffcc;
text-shadow:0 0 15px #00ffcc;
font-size:3.5rem;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #00ffcc;}
to{text-shadow:0 0 25px #00ffcc;}
}

.subtitle{
margin-top:15px;
color:#ccc;
font-size:1.2rem;
}

/* BUTTON */

.btn{
margin-top:30px;
padding:12px 25px;
border:2px solid #00ffcc;
background:transparent;
color:#00ffcc;
font-size:16px;
cursor:pointer;
transition:0.4s;
border-radius:30px;
}

.btn:hover{
background:#00ffcc;
color:black;
box-shadow:0 0 20px #00ffcc;
transform:scale(1.1);
}

/* SOCIAL ICON */

.social{
margin-top:40px;
}

.social img{
width:50px;
transition:0.4s;
filter:invert(1);
}

.social img:hover{
transform:scale(1.4) rotate(10deg);
}

/* FLOATING CIRCLE */

.circle{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(#00ffcc,transparent);
top:20%;
left:10%;
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-40px);}
}

.circle2{
position:absolute;
width:150px;
height:150px;
border-radius:50%;
background:radial-gradient(#ff00ff,transparent);
bottom:10%;
right:10%;
animation:float 7s infinite ease-in-out;
}

/* MOBILE */

@media(max-width:600px){

.title{font-size:2rem;}
.name{font-size:2.5rem;}

.navbar{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle2"></div>

<div class="navbar">
<div>🚀 Adhi Dev</div>

<div>
<a href="#">Profile</a>
<a href="#">Projects</a>
<a href="#">Qualification</a>
<a href="#">Contact</a>
</div>
</div>

<div class="container">

<h1 class="title">
Hi, I'm <span class="name">Adhi</span>
</h1>

<p class="subtitle">
Futuristic Web Developer • UI Designer • Creative Coder
</p>

<button class="btn">Download Resume</button>

<div class="social">
<a href="https://www.instagram.com/_adhi_xy/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
</div>

</div>

</body>
</html>
